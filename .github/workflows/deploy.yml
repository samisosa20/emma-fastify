name: CI/CD Emma Backend Fastify

on:
  push:
    branches: ["master"]

jobs:
  # Build y Push
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/emma-fastify:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            CONTAINER="emma_fastify"
            IMAGE="${{ secrets.DOCKER_USERNAME }}/emma-fastify:latest"
            HOST_PORT="${{ secrets.SERVER_PORT || '8010' }}"

            echo "=== Actualizando ==="
            docker pull $IMAGE
            docker stop $CONTAINER || true
            docker rm $CONTAINER || true

            echo "=== Iniciando ==="
            docker run -d \
              --name $CONTAINER \
              --restart unless-stopped \
              --cpus="1.0" \
              --memory="512m" \
              --pids-limit=100 \
              -p ${HOST_PORT}:8010 \
              -e NODE_ENV=production \
              -e PORT=8010 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRES_IN="1D" \
              -e APP_URL="${{ secrets.APP_URL }}" \
              -e DATABASE_PROVIDER="${{ secrets.DATABASE_PROVIDER }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              $IMAGE

            echo "=== Limpieza ==="
            docker image prune -f
