name: CI/CD Emma Backend Fastify

on:
  push:
    branches: ["main"]

jobs:
  # Build y Push
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/emma-fastify:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            CONTAINER="emma_fastify"
            IMAGE="${{ secrets.DOCKER_USERNAME }}/emma-fastify:latest"
            HOST_PORT="${{ secrets.SERVER_PORT || '8010' }}"

            # 1. Crear archivo .env en el servidor desde el secreto
            echo "${{ secrets.ENV_FILE }}" > .env.emma

            echo "=== Actualizando ==="
            docker pull $IMAGE
            docker stop $CONTAINER || true
            docker rm $CONTAINER || true

            # (Opcional) Migraciones
            # docker run --rm --env-file .env.emma $IMAGE npm run migrate

            echo "=== Iniciando ==="
            docker run -d \
              --name $CONTAINER \
              --restart unless-stopped \
              -p ${HOST_PORT}:8010 \
              --env-file .env.emma \
              $IMAGE
              
            # Borrar el archivo .env del disco por seguridad tras el arranque
            rm .env.emma

            echo "=== Limpieza ==="
            docker image prune -f
